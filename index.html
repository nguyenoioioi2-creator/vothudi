<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu Ứng Ngón Tay 3D Chuẩn</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .title {
            position: absolute;
            top: 8%;
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="title">MIDDLE FINGER ANIMATION</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. Khởi tạo Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Định hình Form dáng bằng thuật toán tạo điểm chính xác
        const points = [];

        // Hàm thêm điểm có độ nhiễu nhỏ để cụm hạt dày dặn
        function addTargetPoint(x, y) {
            for(let k=0; k<3; k++) { // Nhân bản điểm để tăng mật độ hạt
                points.push({
                    x: x + (Math.random() - 0.5) * 0.4,
                    y: y + (Math.random() - 0.5) * 0.4,
                    z: (Math.random() - 0.5) * 1.5
                });
            }
        }

        // TẠO HÌNH NGÓN TAY GIỮA BẰNG CÁC ĐOẠN ĐIỂM
        // Lòng bàn tay / Đế tay Phía dưới
        for (let x = -4; x <= 4; x += 0.2) {
            for (let y = -6; y <= -2; y += 0.3) {
                addTargetPoint(x, y);
            }
        }
        // Ngón cái (bên trái, ngắn, chỉa ra)
        for (let x = -4; x >= -6; x -= 0.2) {
            let y = -2 + (x + 4) * 0.5;
            addTargetPoint(x, y);
            addTargetPoint(x, y - 0.5);
        }
        // Ngón trỏ (gập lại thấp)
        for (let y = -2; y <= 0; y += 0.2) { addTargetPoint(-2.5, y); addTargetPoint(-2, y); }
        
        // CỰC KỲ QUAN TRỌNG: NGÓN GIỮA (Giơ cao vút lên)
        for (let y = -2; y <= 8; y += 0.15) { 
            addTargetPoint(-0.5, y); 
            addTargetPoint(0, y); 
            addTargetPoint(0.5, y); 
        }
        // Top đầu ngón giữa (bo tròn đỉnh)
        for (let x = -0.5; x <= 0.5; x += 0.15) { addTargetPoint(x, 8); }

        // Ngón áp út (gập lại thấp)
        for (let y = -2; y <= 0; y += 0.2) { addTargetPoint(2, y); addTargetPoint(2.5, y); }
        // Ngón út (gập thấp nhất)
        for (let y = -2; y <= -0.5; y += 0.2) { addTargetPoint(4, y); }


        // 3. Khởi tạo Particle System từ số điểm đã tính toán
        const count = points.length;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const targetPositions = new Float32Array(count * 3);

        for (let i = 0; i < count; i++) {
            // Gán vị trí đích chuẩn từ mảng vẽ hình
            targetPositions[i * 3] = points[i].x;
            targetPositions[i * 3 + 1] = points[i].y;
            targetPositions[i * 3 + 2] = points[i].z;

            // Vị trí xuất phát tụ lại một cụm nhỏ hỗn loạn ở tâm
            positions[i * 3] = (Math.random() - 0.5) * 2;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 2 - 4;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // Màu Vàng Gold Sáng Rực rỡ
        const material = new THREE.PointsMaterial({
            color: 0xFFD700,
            size: 0.2,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // 4. Hiệu ứng GSAP bung hạt vẽ từ dưới lên ngón tay cực mượt
        const posAttribute = geometry.attributes.position;
        const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 2.5 });

        for (let i = 0; i < count; i++) {
            // Hạt nào có tọa độ Y càng cao (ở đầu ngón giữa) thì sẽ bay lên muộn hơn -> Tạo hiệu ứng vẽ từ dưới lên
            const delay = ((targetPositions[i * 3 + 1] + 6) / 14) * 2.5;

            tl.to(posAttribute.array, {
                [i * 3]: targetPositions[i * 3],
                [i * 3 + 1]: targetPositions[i * 3 + 1],
                [i * 3 + 2]: targetPositions[i * 3 + 2],
                duration: 2.0 + Math.random() * 1.0,
                ease: "power2.out",
                onUpdate: () => {
                    posAttribute.needsUpdate = true;
                }
            }, delay);
        }

        // 5. Vòng lặp Render & Xoay nhẹ 3D góc nhìn
        function animate() {
            requestAnimationFrame(animate);
            
            // Lắc nhẹ mô hình qua lại để thấy hiệu ứng các hạt lấp lánh trong không gian 3D
            particleSystem.rotation.y = Math.sin(Date.now() * 0.001) * 0.25;
            
            renderer.render(scene, camera);
        }
        animate();

        // Cập nhật kích thước khi đổi kích cỡ trình duyệt
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
